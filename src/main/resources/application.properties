spring.application.name=API_Retro_Pixel

# Datos de conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/retropixel_db?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true


# ==========================================
# CONFIGURACIÓN DE LOGS (Nivel Profesional)
# ==========================================
# Ruta y nombre del archivo donde se guardará la "caja negra"
logging.file.name=logs/api-retropixel.log
# Si el archivo supera los 10 Megas, se comprime y se crea uno nuevo
logging.logback.rollingpolicy.max-file-size=10MB
# Solo guardamos el historial de los últimos 7 días
logging.logback.rollingpolicy.max-history=7